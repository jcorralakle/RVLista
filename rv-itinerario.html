<title>🗺️ Itinerario RV — Viaje 2026</title>
<style>
:root{
  --navy:#1A2E4A;--teal:#0D7377;--gold:#F5A623;
  --green:#2E7D32;--gl:#E8F5E9;
  --red:#C62828;--rl:#FFEBEE;--rb:#EF9A9A;
  --bg:#F0F2F5;--text:#1A2E4A;--muted:#6B7C8D;
  --border:#E0E0E0;--r:16px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:90px}

/* TOP NAV between apps */
.appnav{background:#0D7377;display:flex;border-bottom:2px solid #F5A623;position:sticky;top:0;z-index:999}
.appnav a{flex:1;padding:11px 8px;text-align:center;font-size:13px;font-weight:700;text-decoration:none;color:rgba(255,255,255,.85);border-right:1px solid rgba(0,0,0,.1)}
.appnav a:last-child{border-right:none}
.appnav a.here{background:#F5A623;color:#1A2E4A}

/* HEADER */
.header{background:var(--navy);color:#fff;padding:14px 16px 0;box-shadow:0 2px 12px rgba(0,0,0,.2)}
.header h1{font-size:18px;font-weight:700;color:var(--gold);line-height:1.2;margin-bottom:2px}
.header p{font-size:12px;color:rgba(255,255,255,.6);margin-bottom:10px}
.pcnt{font-size:11px;color:rgba(255,255,255,.55);display:flex;justify-content:space-between;margin-bottom:4px}
.pct{font-size:18px;font-weight:700;color:var(--gold)}
.pbg{background:rgba(255,255,255,.15);border-radius:99px;height:5px;overflow:hidden;margin-bottom:10px}
.pfill{background:var(--gold);height:5px;border-radius:99px;transition:width .3s;width:0%}
.sync{font-size:11px;color:rgba(255,255,255,.4);text-align:center;padding-bottom:8px;min-height:20px}
.sync.on{color:var(--gold)}.sync.ok{color:#81C784}.sync.err{color:#EF9A9A}

/* DESTINATION TABS */
.dest-tabs{display:flex;overflow-x:auto;background:var(--navy);padding:0 10px 12px;gap:6px;scrollbar-width:none;border-top:1px solid rgba(255,255,255,.08)}
.dest-tabs::-webkit-scrollbar{display:none}
.dtab{flex-shrink:0;padding:8px 14px;border-radius:20px;font-size:13px;font-weight:700;cursor:pointer;border:1.5px solid rgba(255,255,255,.2);color:rgba(255,255,255,.7);background:rgba(255,255,255,.08);transition:all .15s;white-space:nowrap}
.dtab.active{color:var(--navy);border-color:transparent}

/* DESTINATION COLORS */
.dest-destin .dtab-destin.active{background:#0277BD}
.dest-nola .dtab-nola.active{background:#6A1B9A}
.dest-chatt .dtab-chatt.active{background:#1565C0}
.dest-smokies .dtab-smokies.active{background:#2E7D32}
.dest-regreso .dtab-regreso.active{background:#AD1457}

/* DAY HEADER color by dest */
.dest-destin .day-hdr{background:linear-gradient(135deg,#01579B,#0277BD);color:#fff}
.dest-nola .day-hdr{background:linear-gradient(135deg,#4A148C,#6A1B9A);color:#fff}
.dest-chatt .day-hdr{background:linear(135deg,#0D47A1,#1565C0);background:linear-gradient(135deg,#0D47A1,#1565C0);color:#fff}
.dest-smokies .day-hdr{background:linear-gradient(135deg,#1B5E20,#2E7D32);color:#fff}
.dest-regreso .day-hdr{background:linear-gradient(135deg,#880E4F,#AD1457);color:#fff}

/* SECTIONS */
.wrap{padding:10px 13px 0}
.section{margin-bottom:11px}
.day-hdr{display:flex;align-items:center;gap:9px;padding:12px 14px;border-radius:var(--r) var(--r) 0 0;cursor:pointer;user-select:none}
.day-icon{font-size:20px}
.day-info{flex:1}
.day-title{font-size:15px;font-weight:700;line-height:1.2}
.day-sub{font-size:11px;opacity:.8;margin-top:2px}
.day-badge{font-size:11px;font-weight:600;padding:3px 8px;border-radius:99px;background:rgba(255,255,255,.25);white-space:nowrap;align-self:flex-start;margin-top:2px}
.chev{font-size:14px;transition:transform .2s;opacity:.8}
.section.collapsed .chev{transform:rotate(-90deg)}
.sec-body{background:#fff;border-radius:0 0 var(--r) var(--r);overflow:hidden;border:1.5px solid var(--border);border-top:none}
.section.collapsed .sec-body{display:none}

/* ITEMS */
.item{display:flex;align-items:flex-start;gap:11px;padding:13px 12px 13px 14px;border-bottom:1px solid var(--border)}
.item:last-of-type{border-bottom:none}
.item.done{background:var(--gl)}
.chkbox{width:28px;height:28px;min-width:28px;border-radius:8px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;background:#fff;margin-top:1px}
.item.done .chkbox{background:var(--green);border-color:var(--green)}
.ck{color:#fff;font-size:15px;font-weight:800;display:none}
.item.done .ck{display:block}
.ibody{flex:1;cursor:pointer;min-width:0}
.itext{font-size:17px;line-height:1.4;color:var(--text);font-weight:500;word-break:break-word}
.item.done .itext{text-decoration:line-through;color:var(--muted)}
.inote{font-size:13px;color:var(--muted);margin-top:3px;line-height:1.4}
.itime{display:inline-block;font-size:12px;font-weight:700;color:#fff;padding:2px 8px;border-radius:99px;background:var(--teal);margin-bottom:4px}
.warn-pill{display:inline-flex;font-size:11px;font-weight:700;padding:2px 7px;border-radius:99px;background:var(--rl);color:var(--red);border:1px solid var(--rb);margin-top:4px;text-transform:uppercase}
.item.done .warn-pill,.item.done .itime{opacity:.4}
.iacts{display:flex;flex-direction:column;gap:3px;flex-shrink:0;margin-top:1px}
.abtn{width:28px;height:28px;border-radius:7px;border:1px solid var(--border);background:#fff;font-size:14px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.abtn:active{opacity:.6;transform:scale(.9)}
.add-row{padding:9px 12px;border-top:1px dashed var(--border);background:#fafafa;display:flex}
.add-ibtn{background:var(--teal);color:#fff;border:none;border-radius:8px;padding:9px 16px;font-size:14px;font-weight:600;cursor:pointer;width:100%}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:500;display:none;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:20px 20px 0 0;padding:20px 18px 40px;width:100%;max-width:560px}
.modal h3{font-size:17px;font-weight:700;margin-bottom:14px}
.ml{font-size:11px;color:var(--muted);font-weight:700;display:block;margin-bottom:4px;margin-top:12px;text-transform:uppercase;letter-spacing:.5px}
.mi{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:12px 14px;font-size:16px;color:var(--text);outline:none;font-family:inherit}
.mi:focus{border-color:var(--teal)}
.ctog{display:flex;align-items:center;gap:12px;margin-top:12px;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;cursor:pointer;user-select:none}
.ctog.on{border-color:var(--red);background:var(--rl)}
.tdot{width:44px;height:26px;border-radius:99px;background:var(--border);position:relative;transition:background .2s;flex-shrink:0}
.tdot::after{content:'';position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.ctog.on .tdot{background:var(--red)}
.ctog.on .tdot::after{transform:translateX(18px)}
.mbtns{display:flex;gap:10px;margin-top:16px}
.mcancel{flex:1;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:13px;font-size:16px;font-weight:600;color:var(--muted);cursor:pointer}
.msave{flex:2;background:var(--teal);border:none;border-radius:10px;padding:13px;font-size:16px;font-weight:700;color:#fff;cursor:pointer}

.fab{position:fixed;bottom:22px;right:16px;width:50px;height:50px;background:var(--navy);color:#fff;border-radius:50%;border:none;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(0,0,0,.25);z-index:200}

</head>

const DB_URL  = "https://rvlista-b7a7e-default-rtdb.firebaseio.com";

let db, dbRef, saveTimer;

function setSync(m,c){const s=document.getElementById('sync');s.textContent=m;s.className='sync'+(c?' '+c:'');}
function initDB(){
  try{
    let app; try{app=firebase.app();}catch(e){app=firebase.initializeApp({databaseURL:DB_URL});}
    db=firebase.database(app); dbRef=db.ref(DB_PATH);
    setSync('⟳ Conectando...','on');
    dbRef.on('value',snap=>{
      const v=snap.val();
      if(v&&v.dests&&v.checked!==undefined){dests=v.dests;checked=v.checked||{};}
      else{dests=JSON.parse(JSON.stringify(DEFAULTS));checked={};push();}
      setSync('● En vivo · '+new Date().toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'}),'ok');
      render();
    },e=>setSync('✗ '+e.message,'err'));
  }catch(e){setSync('✗ '+e.message,'err');}
}
function push(){
  if(!dbRef)return;
  setSync('⟳ Guardando...','on');
  dbRef.set({dests,checked})
    .then(()=>setSync('● Guardado · '+new Date().toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'}),'ok'))
    .catch(e=>setSync('✗ '+e.message,'err'));
}
function sched(){if(saveTimer)clearTimeout(saveTimer);saveTimer=setTimeout(push,600);}

// ── STATE ─────────────────────────────────────────────────────
let dests=[], checked={}, activeDest="destin";
let modalMode=null, modalCtx={}, warnOn=false;
function uid(){return 'i'+Math.random().toString(36).substr(2,8);}
function findDest(id){return dests.find(d=>d.id===id);}
function findDay(destId,dayId){const d=findDest(destId);return d?d.days.find(dy=>dy.id===dayId):null;}
function findItem(id){for(const d of dests)for(const dy of d.days){const i=dy.items.find(x=>x.id===id);if(i)return i;}return null;}

// ── TOGGLE ────────────────────────────────────────────────────
function toggle(id){
  checked[id]=!checked[id];
  sched();
  const el=document.getElementById('itm-'+id);
  if(el){if(checked[id])el.classList.add('done');else el.classList.remove('done');}
  updateStats();
}

// ── DEST TAB ──────────────────────────────────────────────────
function setDest(id){
  activeDest=id;
  document.querySelectorAll('.dtab').forEach(t=>t.classList.remove('active'));
  const bt=document.getElementById('dtab-'+id);
  if(bt)bt.classList.add('active');
  render();
}

// ── MODAL ─────────────────────────────────────────────────────
function setW(v){warnOn=v;const t=document.getElementById('ctog');if(v)t.classList.add('on');else t.classList.remove('on');}
function toggleW(){setW(!warnOn);}
function openEdit(destId,dayId,itemId){
  const item=findItem(itemId);if(!item)return;
  modalMode='edit';modalCtx={destId,dayId,itemId};
  document.getElementById('mtitle').textContent='✏️ Editar actividad';
  document.getElementById('mtext').value=item.text;
  document.getElementById('mtime').value=item.time||'';
  document.getElementById('mnote').value=item.note||'';
  setW(!!item.warn);
  document.getElementById('modal').classList.add('open');
  setTimeout(()=>document.getElementById('mtext').focus(),80);
}
function openAdd(destId,dayId){
  modalMode='add';modalCtx={destId,dayId};
  document.getElementById('mtitle').textContent='➕ Agregar actividad';
  document.getElementById('mtext').value='';
  document.getElementById('mtime').value='';
  document.getElementById('mnote').value='';
  setW(false);
  document.getElementById('modal').classList.add('open');
  setTimeout(()=>document.getElementById('mtext').focus(),80);
}
function saveModal(){
  const t=document.getElementById('mtext').value.trim();if(!t)return;
  const ti=document.getElementById('mtime').value.trim();
  const n=document.getElementById('mnote').value.trim();
  if(modalMode==='edit'){
    const item=findItem(modalCtx.itemId);
    if(item){item.text=t;item.time=ti;item.note=n;item.warn=warnOn;}
  }else{
    const day=findDay(modalCtx.destId,modalCtx.dayId);
    if(day)day.items.push({id:uid(),text:t,time:ti,note:n,warn:warnOn});
  }
  sched();closeModal();render();
}
function closeModal(){document.getElementById('modal').classList.remove('open');modalMode=null;modalCtx={};}
function overlayClick(e){if(e.target===document.getElementById('modal'))closeModal();}
document.addEventListener('keydown',e=>{
  if(e.key==='Escape')closeModal();
  if(e.key==='Enter'&&document.getElementById('modal').classList.contains('open')
    &&document.activeElement.tagName!=='BUTTON')saveModal();
});
function delItem(destId,dayId,itemId){
  const day=findDay(destId,dayId);if(!day)return;
  day.items=day.items.filter(i=>i.id!==itemId);
  delete checked[itemId];sched();render();
}
function toggleDay(id){const el=document.getElementById('sec-'+id);if(el)el.classList.toggle('collapsed');}

// ── STATS ─────────────────────────────────────────────────────
function updateStats(){
  const dest=findDest(activeDest);
  if(!dest){document.getElementById('pct').textContent='0%';document.getElementById('cnt').textContent='';return;}
  const all=dest.days.flatMap(d=>d.items);
  const total=all.length,done=all.filter(i=>checked[i.id]).length;
  const pct=total>0?Math.round(done/total*100):0;
  document.getElementById('pct').textContent=pct+'%';
  document.getElementById('cnt').textContent=done+' de '+total+' en '+dest.label;
  document.getElementById('pfill').style.width=pct+'%';
}

// ── RENDER ────────────────────────────────────────────────────
function render(){
  // Destination tabs
  const tabsEl=document.getElementById('dest-tabs');
  tabsEl.innerHTML='';
  dests.forEach(d=>{
    const bt=document.createElement('button');
    bt.className='dtab '+d.tab+(d.id===activeDest?' active':'');
    bt.id='dtab-'+d.id;
    bt.textContent=d.label;
    bt.onclick=()=>setDest(d.id);
    tabsEl.appendChild(bt);
  });

  // Content
  const wrap=document.getElementById('main-wrap');
  wrap.innerHTML='';
  const dest=findDest(activeDest);
  if(!dest){updateStats();return;}

  // Wrap with dest class for color theming
  const destWrap=document.createElement('div');
  destWrap.className=dest.cls;

  dest.days.forEach(day=>{
    const doneC=day.items.filter(i=>checked[i.id]).length;
    const outer=document.createElement('div');
    outer.className='wrap';
    const sec=document.createElement('div');
    sec.className='section';
    sec.id='sec-'+day.id;

    const hdr=document.createElement('div');
    hdr.className='day-hdr';
    hdr.innerHTML=`<span class="day-icon">${day.icon}</span><div class="day-info"><div class="day-title">${day.title}</div><div class="day-sub">${day.sub}</div></div><span class="day-badge">${doneC}/${day.items.length}</span><span class="chev">▾</span>`;
    hdr.onclick=()=>toggleDay(day.id);
    sec.appendChild(hdr);

    const body=document.createElement('div');
    body.className='sec-body';
    day.items.forEach(item=>body.appendChild(buildItem(dest.id,day.id,item)));

    const ar=document.createElement('div');
    ar.className='add-row';
    const ab=document.createElement('button');
    ab.className='add-ibtn';
    ab.textContent='+ Agregar actividad';
    ab.onclick=(e)=>{e.stopPropagation();openAdd(dest.id,day.id);};
    ar.appendChild(ab);
    body.appendChild(ar);

    sec.appendChild(body);
    outer.appendChild(sec);
    destWrap.appendChild(outer);
  });

  wrap.appendChild(destWrap);
  updateStats();
}

function buildItem(destId,dayId,item){
  const isD=!!checked[item.id];
  const div=document.createElement('div');
  div.className='item'+(isD?' done':'');
  div.id='itm-'+item.id;
  div.innerHTML=`
    <div class="chkbox" onclick="toggle('${item.id}')"><span class="ck">✓</span></div>
    <div class="ibody" onclick="toggle('${item.id}')">
      ${item.time?`<span class="itime">⏰ ${item.time}</span><br>`:''}
      <div class="itext">${item.text}</div>
      ${item.note?`<div class="inote">${item.note}</div>`:''}
      ${item.warn&&!isD?`<span class="warn-pill">⚠️ Importante</span>`:''}
    </div>
    <div class="iacts">
      <button class="abtn" onclick="openEdit('${destId}','${dayId}','${item.id}')">✏️</button>
      <button class="abtn" onclick="delItem('${destId}','${dayId}','${item.id}')">🗑️</button>
    </div>`;
  return div;
}
